name: Bi-daily 생기부 정보 브리핑

on:
  schedule:
    - cron: '0 22 */2 * *' # Every 2 days at 07:00 KST
  workflow_dispatch:

jobs:
  crawl-and-post:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 생기부 브리핑 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_AXIOM_PAGE_ID: ${{ secrets.NOTION_AXIOM_PAGE_ID }}
          TZ: Asia/Seoul
        run: python crawl_star.py
